stages:
  - sync

sync_wiki:
  stage: sync
  image: alpine:3.20

  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: manual

  before_script:
    - apk add --no-cache git
    - git config user.email "wiki-bot@example.com"
    - git config user.name "wiki-sync-bot"

  script:
    - |
      set -euo pipefail

      : "${GITLAB_TOKEN:?GITLAB_TOKEN is required}"
      WIKI_REPO="https://oauth2:${GITLAB_TOKEN}@lab.회사.com/프로젝트/레포지토리.wiki.git"

      echo "===== Step 1. 기존 wiki 삭제 ====="
      rm -rf .gitlab/.wiki

      echo "===== Step 2. Wiki clone ====="
      git clone --depth 1 "$WIKI_REPO" .gitlab/.wiki

      echo "===== Step 3. wiki git metadata 제거 ====="
      rm -rf .gitlab/.wiki/.git

      echo "===== Step 4. 변경 여부 확인 ====="
      git add .gitlab/.wiki

      if git diff --cached --quiet; then
        echo "No changes detected. Sync skipped."
        exit 0
      fi

      echo "===== Step 5. Commit 생성 ====="
      git commit -m "[docs] 위키 수정 사항 깃랩에 동기화"

      echo "===== Step 6. Push ====="
      git push "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:${CI_COMMIT_BRANCH}